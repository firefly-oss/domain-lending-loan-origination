      - verificationStatus
      - verificationType
      type: object
      properties:
        verificationId:
          type: string
          format: uuid
        loanApplicationId:
          type: string
          format: uuid
        verificationType:
          type: string
        verificationStatus:
          type: string
        verificationMethod:
          type: string
        verifiedBy:
          type: string
        verifiedAt:
          type: string
          format: date-time
        verificationData:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PaginationResponseApplicationVerificationDTO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationVerificationDTO"
        totalElements:
          type: integer
