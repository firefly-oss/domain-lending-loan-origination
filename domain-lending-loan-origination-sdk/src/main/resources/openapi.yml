components:
  schemas:
    RegisterApplicationDocumentCommand:
      required:
      - documentId
      - documentTypeId
      - isMandatory
      - isReceived
      - loanApplicationId
      type: object
      properties:
        applicationDocumentId:
          type: string
          format: uuid
        loanApplicationId:
          type: string
          format: uuid
        documentId:
          type: string
          format: uuid
        documentTypeId:
          type: string
          format: uuid
        isMandatory:
          type: boolean
        isReceived:
          type: boolean
        receivedAt:
          type: string
          format: date-time
        documentName:
          type: string
        fileSizeBytes:
          type: integer
          format: int64
        mimeType:
          type: string
        verificationStatus:
          type: string
        verifiedBy:
          type: string
          format: uuid
        verifiedAt:
          type: string
          format: date-time
        rejectionReason:
          type: string
        expiryDate:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RegisterApplicationPartyCommand:
      required:
      - employmentTypeId
      - loanApplicationId
      - partyId
      - roleCodeId
      type: object
      properties:
        applicationPartyId:
          type: string
          format: uuid
        loanApplicationId:
          type: string
          format: uuid
        partyId:
          type: string
          format: uuid
        roleCodeId:
          type: string
          format: uuid
        sharePercentage:
          type: number
        annualIncome:
          type: number
        monthlyExpenses:
          type: number
        employmentTypeId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RegisterLoanApplicationCommand:
      required:
      - applicationDate
      - applicationStatusId
      - applicationSubStatusId
      - submissionChannelId
      type: object
      properties:
        loanApplicationId:
          type: string
          format: uuid
        applicationNumber:
          type: string
          format: uuid
        applicationStatusId:
          type: string
          format: uuid
        applicationSubStatusId:
          type: string
          format: uuid
        applicationDate:
          type: string
          format: date
        submissionChannelId:
          type: string
          format: uuid
        distributorId:
          type: string
          format: uuid
        distributorAgencyId:
          type: string
          format: uuid
        distributorAgentId:
          type: string
          format: uuid
        businessUnit:
          type: string
        branchId:
          type: string
          format: uuid
        loanPurpose:
          type: string
        loanPurposeDescription:
          type: string
        submittedAt:
          type: string
          format: date-time
        firstReviewAt:
          type: string
          format: date-time
        decisionDueDate:
          type: string
          format: date
        expectedClosingDate:
          type: string
          format: date
        loanOfficerId:
          type: string
          format: uuid
        assignedAt:
          type: string
          format: date-time
        isRush:
          type: boolean
        isException:
          type: boolean
        requiresManualReview:
          type: boolean
        externalReferenceNumber:
          type: string
        sourceSystem:
          type: string
        disbursementMethodType:
          type: string
          enum:
          - INTERNAL_ACCOUNT
          - EXTERNAL_ACCOUNT
        disbursementInternalAccountId:
          type: string
          format: uuid
        disbursementExternalBankAccountId:
          type: string
          format: uuid
        paymentCollectionMethodType:
          type: string
          enum:
          - INTERNAL_ACCOUNT
          - EXTERNAL_ACCOUNT
        paymentCollectionInternalAccountId:
          type: string
          format: uuid
        paymentCollectionExternalBankAccountId:
          type: string
          format: uuid
        note:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RegisterLoanApplicationStatusHistoryCommand:
      required:
      - changedAt
      - changedBy
      - loanApplicationId
      - newStatus
      - oldStatus
      type: object
      properties:
        statusHistoryId:
          type: string
          format: uuid
        loanApplicationId:
          type: string
          format: uuid
        oldStatus:
          type: string
          enum:
          - DRAFT
          - SUBMITTED
          - UNDER_REVIEW
          - APPROVED
          - REJECTED
          - CANCELLED
        newStatus:
          type: string
          enum:
          - DRAFT
          - SUBMITTED
          - UNDER_REVIEW
          - APPROVED
          - REJECTED
          - CANCELLED
        changeReason:
          type: string
        changedAt:
          type: string
          format: date-time
        changedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RegisterProposedOfferCommand:
      required:
      - loanApplicationId
      - productId
      - requestedAmount
      - requestedInterestRate
      - requestedTenorMonths
      type: object
      properties:
        proposedOfferId:
          type: string
          format: uuid
        loanApplicationId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        requestedAmount:
          type: number
        requestedTenorMonths:
          type: integer
          format: int32
        requestedInterestRate:
          type: number
        validUntil:
          type: string
          format: date
        offerStatus:
          type: string
        acceptedAt:
          type: string
          format: date-time
        acceptedBy:
          type: string
          format: uuid
        rejectionReason:
          type: string
        monthlyPayment:
          type: number
        totalInterest:
          type: number
        totalAmount:
          type: number
        apr:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RegisterUnderwritingDecisionCommand:
      required:
      - decisionCodeId
      - decisionDate
      - loanApplicationId
      type: object
      properties:
        underwritingDecisionId:
          type: string
          format: uuid
        loanApplicationId:
          type: string
          format: uuid
        decisionDate:
          type: string
          format: date-time
        decisionCodeId:
          type: string
          format: uuid
        approvedAmount:
          type: number
        approvedInterestRate:
          type: number
        tenorMonths:
          type: integer
          format: int32
        riskGradeId:
          type: string
          format: uuid
        remarks:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RegisterUnderwritingScoreCommand:
      required:
      - loanApplicationId
      - scoreValue
      - scorecardName
      - scoringTimestamp
      type: object
      properties:
        underwritingScoreId:
          type: string
          format: uuid
        loanApplicationId:
          type: string
          format: uuid
        scoreValue:
          type: number
        scorecardName:
          type: string
        reasonCodes:
          type: string
        scoringTimestamp:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SubmitApplicationCommand:
      type: object
      properties:
        application:
          $ref: "#/components/schemas/RegisterLoanApplicationCommand"
        parties:
          type: array
          items:
            $ref: "#/components/schemas/RegisterApplicationPartyCommand"
        documents:
          type: array
          items:
            $ref: "#/components/schemas/RegisterApplicationDocumentCommand"
        offers:
          type: array
          items:
            $ref: "#/components/schemas/RegisterProposedOfferCommand"
        statusHistories:
          type: array
          items:
            $ref: "#/components/schemas/RegisterLoanApplicationStatusHistoryCommand"
        score:
          $ref: "#/components/schemas/RegisterUnderwritingScoreCommand"
        decision:
          $ref: "#/components/schemas/RegisterUnderwritingDecisionCommand"
    ApplicationVerificationDTO:
      required:
