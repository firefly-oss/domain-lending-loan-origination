openapi: 3.0.1
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:18080
  description: Generated server url
tags:
- name: Loan Origination
  description: CQ queries and registration for Loan Origination
paths:
  /api/v1/loan-applications:
    post:
      tags:
      - Loan Origination
      summary: Submit application
      description: "Submit an application with product, amount, currency, and channel."
      operationId: submitApplication
      parameters:
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitApplicationCommand"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /api/v1/loan-applications/{appId}/withdraw:
    post:
      tags:
      - Loan Origination
      summary: Withdraw application
      description: Withdraw the application by applicant request.
      operationId: withdrawApplication
      parameters:
      - name: appId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
